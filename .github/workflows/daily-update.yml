name: 毎朝8時 コックピット自動更新

on:
  schedule:
    # 毎日 23:00 UTC = 翌朝 8:00 JST
    - cron: '0 23 * * *'
  workflow_dispatch:  # 手動実行ボタンも有効

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: index.html を生成
        run: python generate.py

      - name: 変更をコミット & プッシュ
        run: |
          git config user.name  "cockpit-bot"
          git config user.email "bot@ai-company.local"
          git add index.html data.json
          # 変更がある時だけコミット（差分なしでもエラーにしない）
          git diff --staged --quiet || git commit -m "🔄 Daily update $(TZ='Asia/Tokyo' date +'%Y-%m-%d %H:%M JST')"
          git push
